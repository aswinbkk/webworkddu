<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
    <link rel="stylesheet" href="form_validation.css">
</head>
<body>
    <section class="form_container">
        <form class="form_class" id="form_id">

            <label>First name</label>
            <input type="text" id="first_name" placeholder="Enter your First name">
            <p id="error_text1" style="color: brown;"></p>

            <label>Second name</label>
            <input type="text" id="second_name" placeholder="Enter your Second name">
            <p id="error_text2" style="color: brown;"></p>

            <label>Email ID</label>
            <input type="text" id="email" placeholder="Enter your email id">
            <p id="error_text3" style="color: brown;"></p>

            <label>Mobile Number</label>
            <input type="number" id="mobile" placeholder="Enter your mobile number">
            <p id="error_text4" style="color: brown;"></p>

            <label>Password</label>
            <input type="password" id="first_pass" placeholder="Enter password">
            <p id="error_text5" style="color: brown;"></p>

            <label>Confirm Password</label>
            <input type="password" id="second_pass" placeholder="Confirm your password">
            <p id="error_text6" style="color: brown;"></p>
            
            <label>Date of birth</label>
            <input type="date" id="dob" placeholder="Enter your date of birth">

            <div>
                <label>Gender</label>
                <input type="radio" name="gender" value="male">Male
                <input type="radio" name="gender" value="female">Female
            </div>
            
            <div>
            <label>Country</label>
            <select id="country">
                <option value="">---Select Country---</option>
                <option value="india">India</option>
                <option value="russia">Russia</option>
                <option value="United Nation">United Nation</option>
            </select>
            </div>
<div>
            <input type="checkbox" id="checkbox">
            <label>Agree terms and Conditions</label>
</div>
            <button id="submit">Submit</button>
        </form>
    </section>
    

    <script src="form_validation.js"></script>
</body>
</html>
