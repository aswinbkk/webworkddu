<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Generator</title>
<link rel="stylesheet" href="dom.css">
</head>
<body>

<div class="form-container">
    <h2>Generate Card</h2>
    <input type="text" id="img_url" placeholder="Image URL" required>
    <input type="text" id="user_name" placeholder="Name" required>
    <input type="text" id="job_title" placeholder="Occupation" required>
    <textarea id="job_info" placeholder="Short description" rows="3"></textarea>
    <button id="generate_btn">Generate Card</button>
</div>
<br>
<br>
<div id="card_container"></div>

<script src="dom.js"></script>
</body>
</html>
