<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boot Strap</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <style>
    .form-box {
      background-color: rgba(186, 186, 255, 0.637);
      max-width: 900px;
      margin: auto;
    }
  </style>
</head>

<body>
  <div class="p-2 container">
    <div class="form-box p-3">
      
      <h3>Please fill your information</h3>

      <div class="mb-3">
        <label for="formGroupExampleInput" class="form-label">Your Full Name</label>
        <input type="text" class="form-control" id="formGroupExampleInput" placeholder="Full Name">
      </div>
      <label>Date of Birth</label>
      <div class="row">
        <div class="col"><input type="number" id="day" class="form-control w-100" placeholder="Day"></div>
        <div class="col"><input type="text" id="month" class="form-control w-100" placeholder="Month"></div>
        <div class="col"><input type="text" id="year" class="form-control w-100" placeholder="Year"></div>
      </div>
    </div>
    <br>

    <div class="form-box p-3 d-flex justify-content-between text-center">
      <div class="form-check form-check-inline">
        <input class="form-check-input text-center" type="radio" name="inlineRadioOptions" id="inlineRadio1" value="option1">
        <label class="form-check-label text-center" for="inlineRadio1">Tax ID</label>
      </div>
      <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio2" value="option2">
        <label class="form-check-label" for="inlineRadio2">Social Security Number</label>
      </div>
      <div><input type="text" id="year" class="form-control w-100" placeholder="Year"></div>
    </div>
    <br>

    <div class="form-box p-3">
      <div class="mb-3" d-flex>
        <label for="formGroupExampleInput" class="form-label">Citizenship</label>
        <input type="text" class="form-control" id="formGroupExampleInput" placeholder="Citizenship">
        <label for="formGroupExampleInput" class="form-label">Country</label>
        <input type="text" class="form-control" id="formGroupExampleInput" placeholder="Country">
      </div>
      <div class="mb-3" d-flex>
        <label for="formGroupExampleInput" class="form-label">Day Phone</label>
        <input type="text" class="form-control" id="formGroupExampleInput" placeholder="Day Phone">
        <label for="formGroupExampleInput" class="form-label">Evening Phone</label>
        <input type="text" class="form-control" id="formGroupExampleInput" placeholder="Evening Phone">
      </div>
      <div class="mb-3" d-flex>
        <label for="formGroupExampleInput" class="form-label">Address Line 1</label>
        <input type="text" class="form-control" id="formGroupExampleInput" placeholder="Address Line 1">
        <label for="formGroupExampleInput" class="form-label">Address Line 2</label>
        <input type="text" class="form-control" id="formGroupExampleInput" placeholder="Address Line 2">
      </div>
      <div class="mb-3" d-flex>
        <label for="formGroupExampleInput" class="form-label">City</label>
        <input type="text" class="form-control" id="formGroupExampleInput" placeholder="City">
        <label for="formGroupExampleInput" class="form-label">State</label>
        <input type="text" class="form-control" id="formGroupExampleInput" placeholder="State">
        <label for="formGroupExampleInput" class="form-label">Zip Code</label>
        <input type="text" class="form-control" id="formGroupExampleInput" placeholder="State">
      </div>
    </div>
    <br>

    <div class="form-box p-3">
      <div class="form-check form-check-inline">
        <input class="form-check-input text-center" type="radio" name="inlineRadioOptions" id="inlineRadio1" value="option1">
        <label class="form-check-label text-center" for="inlineRadio1">Subject to backup with holding</label>
      </div>
      <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio2" value="option2">
        <label class="form-check-label" for="inlineRadio2">I want to reinvest my dividends</label>
      </div>
    </div>
    <br>

    <div class="form-box p-3">
      <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio2" value="option2">
        <label class="form-check-label" for="inlineRadio2">+Add optional mail address</label>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
