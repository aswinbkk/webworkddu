<!DOCTYPE html>
<html lang="en">
    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Array operations</title>
</head>
<body>
    <div class="main_container">
        <section>
            <div class="sub_hed">
                <h1>Array operations</h1>
            </div>
            <div class="output_board">
                <h4 id="result"></h4>
            </div>
            <div class="input_main">
                <div class="input_sub">
                    <p>Enter a number</p>
                    <input type="text" id="array_ip" placeholder="Enter Number">
                </div>
            </div>
            <div class="oper_button">
                <button type="button" id="fremove_btn">Remove number from first</button>
                <button type="button" id="fadd_btn">Add number from first</button>
                <button type="button" id="ladd_btn">Add number from last</button>
                <button type="button" id="lremove_btn">Remove number from last</button>
            </div>
            <div class="output_board">
                <h4 id="output"></h4>
            </div>
            <div class="oper_button">
                <button type="button" id="splice_btn">Splice</button>
                <button type="button" id="foreach_btn">For each</button>
                <button type="button" id="array_sort_btn">Array sort</button>
                <button type="button" id="lremove_btn">Remove number from last</button>
            </div>
        </section>
    </div>
    
    <script src="array.js"></script>
</body>
</html>
