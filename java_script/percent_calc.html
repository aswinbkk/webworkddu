<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Percentage calculator</title>
</head>
<body>
    <div class="main_container">
        <section>
            <div class="sub_hed">
                <h1>Percentage calculator</h1>
            </div>
            <div class="input_main">
                <div class="input_sub">
                    <p>Enter the number</p>
                    <input type="number" id="first_num" placeholder="Enter Number">
                </div>
                <div class="input_sub">
                    <p>Enter the total</p>
                    <input type="number" id="sec_num" placeholder="Enter Number">
                </div>
            </div>
            <div class="oper_button">
                <button type="button" id="percent_btn">Display percentage</button>
            </div>
            <div class="output_board">
                <h4 id="result"></h4>
            </div>
        </section>
    </div>
    
    <script src="percent_calc.js"></script>
</body>
</html>
