<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Multiplication Table</title>
</head>
<body>
    <div class="main_container">
        <section>
            <div class="sub_hed">
                <h1>Multiplication table</h1>
            </div>
            <div class="input_main">
                <div class="input_sub">
                    <p>Enter the number for multiplication table</p>
                    <input type="number" id="mulnum" placeholder="Enter Number">
                </div>
                <div class="input_sub">
                    <p>Enter the limit</p>
                    <input type="number" id="upto" placeholder="Enter Limit">
                </div>
            </div>
            <div class="oper_button">
                <button type="button" id="mul_btn">Display Multiplication Table</button>
            </div>
            <div class="output_board">
                <h4 id="result"></h4>
            </div>
        </section>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
