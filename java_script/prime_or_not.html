<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Prime or not</title>
</head>
<body>
    <div class="main_container">
        <section>
            <div class="sub_hed">
                <h1>Prime or note</h1>

                    <p>Enter the number</p>

            <div class="oper_button">

            <div class="output_board">
                <h4 id="result"></h4>
            </div>
        </section>
    </div>
    
    <script src="prime_or_not.js"></script>
</body>
