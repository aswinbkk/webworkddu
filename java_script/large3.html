<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Largest of three number</title>
</head>
<body>
    <div class="main_container">
        <section>
            <div class="sub_hed">
                <h1>Largest of three number</h1>
            </div>
            <div class="input_main">
                <div class="input_sub">
                    <p>Enter first number</p>
                    <input type="number" id="first_num" placeholder="Enter Number">
                </div>
                <div class="input_sub">
                    <p>Enter the second number</p>
                    <input type="number" id="sec_num" placeholder="Enter Number">
                </div>
                <div class="input_sub">
                    <p>Enter the third number</p>
                    <input type="number" id="third_num" placeholder="Enter Number">
                </div>
            </div>
            <div class="oper_button">
                <button type="button" id="large_btn">Display largest number</button>
            </div>
            <div class="output_board">
                <h4 id="result"></h4>
            </div>
        </section>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
