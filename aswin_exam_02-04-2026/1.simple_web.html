<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; font-family: sans-serif; }
    
    /* Navbar styles */
    .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background-color: #333; color: white; }
    .navlinks a { color: white; text-decoration: none; margin: 0 15px; }
    .connect-btn { padding: 8px 15px; cursor: pointer; }

    /* Hero styles */
    .hero { height: 100vh; background: url('https://via.placeholder.com/1920x1080') center/cover; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; }
    .hero h1 { font-size: 4rem; margin-bottom: 10px; }
    .hero p { font-size: 1.5rem; }

    /* Footer styles */
    .footer { display: flex; justify-content: space-between; align-items: flex-end; padding: 20px 30px; background-color: #222; color: white; min-height: 100px; }
    .footer a { color: #4DA8DA; text-decoration: none; }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="logo">MyLogo</div>
    <div class="navlinks">
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Services</a>
    </div>
    <button class="connect-btn">Connect</button>
  </nav>

  <header class="hero">
    <h1>Main Title Here</h1>
    <p>This is a description of the hero section.</p>
  </header>

  <footer class="footer">
    <div class="logo-bottom">MyLogo</div>
    <a href="#">Contact Us</a>
  </footer>

</body>
</html>
