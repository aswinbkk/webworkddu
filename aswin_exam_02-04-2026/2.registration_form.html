<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; }
    .form-container { border: 1px solid #ccc; padding: 20px; border-radius: 8px; width: 300px; background: #f9f9f9; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
    .form-group input[type="text"], .form-group input[type="email"], .form-group input[type="password"] { width: 100%; padding: 8px; box-sizing: border-box; }
    .error { color: red; font-size: 0.8em; display: none; margin-top: 5px; }
  </style>
</head>
<body>

  <div class="form-container">
    <h2>Register</h2>
    <form id="regForm" onsubmit="return validateForm(event)">
      
      <div class="form-group">
        <label>Name:</label>
        <input type="text" id="name" placeholder="Enter Name">
      </div>

      <div class="form-group">
        <label>Email:</label>
        <input type="email" id="email" placeholder="Enter Email">
      </div>

      <div class="form-group">
        <label>Password:</label>
        <input type="password" id="password" placeholder="Enter Password">
      </div>

      <div class="form-group">
        <label>Gender:</label>
        <input type="radio" name="gender" value="Male"> Male
        <input type="radio" name="gender" value="Female"> Female
      </div>

      <div class="form-group">
        <label>Hobbies:</label>
        <input type="checkbox" value="Reading"> Reading
        <input type="checkbox" value="Sports"> Sports
        <input type="checkbox" value="Music"> Music
      </div>

      <p id="errorMsg" class="error">Please fill in Name, Email, and Password!</p>

      <button type="submit">Submit</button>
    </form>
  </div>

  <script>
    function validateForm(event) {
      event.preventDefault(); // Prevent page reload
      
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorMsg = document.getElementById('errorMsg');

      if (!name || !email || !password) {
        errorMsg.style.display = 'block';
        return false;
      }
      
      errorMsg.style.display = 'none';
      alert('Form submitted successfully!');
      return true;
    }
  </script>

</body>
</html>
