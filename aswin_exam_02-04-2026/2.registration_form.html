<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration From</title>
    <style>
      body
      {
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        padding: 50px;
      }

      .form_container
      {
        border: 1px solid #ccc;
        padding: 20px;
        border-radius: 8px;
        width: 300px;
        background: #f9f9f9;
      }

      .form_group, .form_group_checkbox, .form_group_radio
      {
        margin-bottom: 15px;
      }

      .form_group label, .form_group_checkbox label, .form_group_radio label
      {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }

      .form_group input
      {
        width: 100%;
        padding: 8px;
        box-sizing: border-box; 
      }

      .error 
      {
        color: red;
        font-size: 0.8em;
        margin-top: 5px;
      }
    </style>
</head>
<body>

  <div class="form_container">
    <h2>Register</h2>
    <form id="form_id">
      
      <div class="form_group">
        <label>Name:</label>
        <input type="text" id="name" placeholder="Enter Name">
      </div>

      <div class="form_group">
        <label>Email:</label>
        <input type="email" id="email" placeholder="Enter Email">
      </div>

      <div class="form_group">
        <label>Password:</label>
        <input type="password" id="password" placeholder="Enter Password">
      </div>

      <div class="form_group_radio">
        <label>Gender:</label>
        <input type="radio" name="gender" value="Male"> Male
        <input type="radio" name="gender" value="Female"> Female
      </div>

      <div class="form_group_checkbox">
        <label>Hobbies:</label>
        <input type="checkbox" value="Reading"> Reading
        <input type="checkbox" value="Sports"> Sports
        <input type="checkbox" value="Music"> Music
      </div>

      <p id="error" class="error"></p>

      <button type="submit">Submit</button>
    </form>
  </div>

  <script>
    let form_id = document.getElementById('form_id');
    form_id.addEventListener('submit', function(parameter){
    parameter.preventDefault();

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const gender = document.querySelector('input[name="gender"]:checked');
      const hobbies = document.querySelectorAll('input[type="checkbox"]:checked');
      const error = document.getElementById('error'); 
      error.textContent = "";
 
      if (name=="" || email=="" || password=="" || !gender || hobbies.length === 0) {
        error.textContent = 'Please fill in all fields and select at least one hobby!';
      }
      
      else alert('Form submitted successfully!');

    });
  </script>

</body>
</html>
